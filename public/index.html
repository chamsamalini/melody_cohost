<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Melody Co-Host Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Online meeting co-host</p>
          <h1>Melody</h1>
          <p class="subhead">Executive Meeting Command Center</p>
        </div>
        <div class="status-stack" aria-live="polite">
          <div class="status-card">
            <span class="status-label">Connection</span>
            <span id="connectionStatus" class="status-pill">Offline</span>
          </div>
          <div class="status-card">
            <span class="status-label">Melody Mode</span>
            <span id="modeStatus" class="status-pill mode-observing">Observing</span>
          </div>
        </div>
      </header>

      <section class="stage-grid">
        <section class="stage-panel" aria-label="Online meeting conversation">
          <div class="meter-wrap" aria-hidden="true">
            <div id="meter" class="meter"></div>
          </div>

          <div class="transcript-head">
            <h2>Conversation</h2>
            <button id="clearLogButton" class="text-button" type="button">Clear</button>
          </div>

          <div id="transcriptLog" class="transcript-log" aria-live="polite"></div>
        </section>

        <aside class="control-panel" aria-label="Host controls">
          <section class="control-section">
            <h2>Session</h2>
            <div class="button-row">
              <button id="connectButton" class="primary-button" type="button">Connect</button>
              <button id="disconnectButton" class="secondary-button" type="button" disabled>Stop</button>
            </div>
          </section>

          <section class="control-section">
            <h2>Host</h2>
            <div class="button-grid">
              <button id="activateButton" class="primary-button" type="button" disabled>Activate Melody</button>
              <button id="pauseButton" class="secondary-button" type="button" disabled>Pause Melody</button>
              <button id="newSessionButton" class="secondary-button" type="button">New Session</button>
            </div>
          </section>

          <section class="control-section">
            <h2>Agenda</h2>
            <div id="agendaStatus" class="agenda-status" aria-live="polite">No agenda provided</div>
            <label class="field-label" for="agendaInput">Document agenda</label>
            <textarea
              id="agendaInput"
              class="text-area"
              rows="6"
              placeholder="Paste the meeting agenda here"
            ></textarea>
            <div class="button-grid">
              <button id="saveAgendaButton" class="primary-button" type="button">Save Agenda</button>
              <button id="captureAgendaButton" class="secondary-button" type="button" disabled>Capture Verbal Agenda</button>
              <button id="clearAgendaButton" class="secondary-button" type="button">Clear Agenda</button>
            </div>
          </section>

          <section class="control-section">
            <h2>Behavior</h2>
            <label class="toggle">
              <input id="autoConverseToggle" type="checkbox" checked>
              <span>Auto converse after activation</span>
            </label>
            <div id="autoConverseStatus" class="auto-converse-status" aria-live="polite">
              Auto converse is enabled. Melody may respond after each participant turn while active.
            </div>
            <label class="field-label" for="triggerInput">Trigger name</label>
            <input id="triggerInput" class="text-input" type="text" value="Melody" autocomplete="off">
          </section>

          <section class="control-section">
            <h2>Activity</h2>
            <div id="eventLog" class="event-log" aria-live="polite"></div>
          </section>
        </aside>
      </section>

      <audio id="remoteAudio" autoplay></audio>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
