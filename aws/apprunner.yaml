version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci --omit=dev
run:
  runtime-version: 20
  command: node server.mjs
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
    - name: OPENAI_REALTIME_MODEL
      value: gpt-realtime
    - name: OPENAI_REALTIME_VOICE
      value: marin
    - name: OPENAI_TRANSCRIPTION_MODEL
      value: gpt-4o-mini-transcribe
